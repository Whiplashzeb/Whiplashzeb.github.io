<div id="vanta-bg"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    function initVanta() {
      var isDark = document.documentElement.classList.contains('dark');
      var el = document.getElementById('vanta-bg');
      if (el && el._vantaEffect) {
        el._vantaEffect.destroy();
      }
      el._vantaEffect = VANTA.FOG({
        el: "#vanta-bg",
        mouseControls: false,
        touchControls: false,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        highlightColor: isDark ? 0x1a2a4a : 0xd4e4f7,
        midtoneColor: isDark ? 0x0f1b33 : 0xe8eff8,
        lowlightColor: isDark ? 0x080e1a : 0xf0f4f8,
        baseColor: isDark ? 0x0b1120 : 0xfafbfc,
        blurFactor: 0.7,
        speed: 0.8,
        zoom: 1.2
      });
    }

    initVanta();

    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.attributeName === 'class') {
          initVanta();
        }
      });
    });
    observer.observe(document.documentElement, { attributes: true });
  });
</script>
