<div id="giscus-container"></div>
<script>
  function loadGiscus() {
    var container = document.getElementById('giscus-container');
    var isDark = document.documentElement.classList.contains('dark');
    var existingFrame = container.querySelector('iframe.giscus-frame');

    if (existingFrame) {
      existingFrame.contentWindow.postMessage(
        { giscus: { setConfig: { theme: isDark ? 'dark' : 'light' } } },
        'https://giscus.app'
      );
      return;
    }

    var script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo', 'Whiplashzeb/Whiplashzeb.github.io');
    script.setAttribute('data-repo-id', 'R_kgDOGOEuqQ');
    script.setAttribute('data-category', 'General');
    script.setAttribute('data-category-id', 'DIC_kwDOGOEuqc4C5ymU');
    script.setAttribute('data-mapping', 'pathname');
    script.setAttribute('data-strict', '0');
    script.setAttribute('data-reactions-enabled', '1');
    script.setAttribute('data-emit-metadata', '0');
    script.setAttribute('data-input-position', 'top');
    script.setAttribute('data-theme', isDark ? 'dark' : 'light');
    script.setAttribute('data-lang', 'zh-CN');
    script.setAttribute('data-loading', 'lazy');
    script.crossOrigin = 'anonymous';
    script.async = true;
    container.appendChild(script);
  }

  loadGiscus();

  new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.attributeName === 'class') loadGiscus();
    });
  }).observe(document.documentElement, { attributes: true });
</script>
